{{template "layout.html" .}}
{{define "content"}}
<div class="card">
    <div class="page-header">
        <h2>Manage Tags</h2>
    </div>

    <form hx-post="/tags" hx-target="#tag-list" hx-swap="innerHTML" hx-on::after-request="this.reset();" style="display: flex; gap: 0.5rem; margin-bottom: 1.5rem;">
        <input type="text" name="name" placeholder="Tag name" required style="flex: 1; padding: 0.625rem; border: 1px solid var(--border); border-radius: var(--radius);">
        <input type="text" name="category" placeholder="Category (optional)" style="flex: 1; padding: 0.625rem; border: 1px solid var(--border); border-radius: var(--radius);">
        <button type="submit" class="btn btn-primary">Add Tag</button>
    </form>

    <div id="tag-list">
        {{template "tag_list_partial.html" .}}
    </div>
</div>
{{end}}
